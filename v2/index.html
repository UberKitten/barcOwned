<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Like a Rubber Ducky, but with barcodes. Program barcode scanners to deliver HID keyboard payloads.">
  <meta name="author" content="Astra West">
  <meta name="theme-color" content="#1a1a2e">
  
  <title>barcOwned</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <div id="app">
    <!-- Navigation -->
    <nav class="nav">
      <div class="nav-brand">
        <button class="nav-menu-btn" id="menuToggle" aria-label="Toggle menu">☰</button>
        <span class="nav-logo">⌘</span>
        <span class="nav-title">barcOwned</span>
      </div>
      
      <div class="nav-links">
        <a href="https://github.com/UberKitten/barcowned/wiki" target="_blank" rel="noopener" class="nav-link">
          Docs
        </a>
        <a href="https://github.com/UberKitten/barcowned" target="_blank" rel="noopener" class="nav-link">
          GitHub
        </a>
      </div>
    </nav>

    <!-- Main Layout -->
    <div class="app-layout">
      <!-- Left Sidebar: Payload List -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>Payloads</h2>
        </div>
        
        <div class="payload-list" id="payloadList">
          <!-- Populated by JS -->
        </div>
        
        <div class="sidebar-footer">
          <button class="btn btn-sm btn-primary" id="newPayloadBtn">+ New</button>
          <button class="btn btn-sm btn-ghost" id="importBtn">Import</button>
          <button class="btn btn-sm btn-ghost" id="exportBtn">Export</button>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content" id="mainContent">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">⌘</div>
          <h2>Select a Payload</h2>
          <p>Choose a payload from the sidebar to get started, or create a new one.</p>
        </div>

        <!-- Payload View (hidden until payload selected) -->
        <div class="payload-view hidden" id="payloadView">
          <!-- Payload Header -->
          <header class="payload-header">
            <h1 class="payload-title" id="payloadTitle">Payload Name</h1>
            <span class="payload-badge" id="payloadBadge">0 barcodes</span>
          </header>

          <!-- Section 1: Editor (Collapsible) -->
          <section class="section section-editor" id="editorSection">
            <button class="section-header" id="editorToggle">
              <span class="section-chevron">▶</span>
              <h2>Editor</h2>
              <span class="section-badge" id="editorBadge">0 barcodes</span>
            </button>
            
            <div class="section-content" id="editorContent">
              <div class="editor-row">
                <input type="text" class="payload-name-input" id="payloadName" placeholder="Payload name...">
                <div class="editor-actions">
                  <button class="btn btn-sm btn-ghost" id="validateBtn">Validate</button>
                  <button class="btn btn-sm btn-primary" id="saveBtn">Save</button>
                </div>
              </div>
              
              <div class="editor-container" id="editorContainer">
                <!-- CodeMirror mounts here -->
              </div>
              
              <div class="editor-status" id="editorStatus">
                <!-- Validation messages -->
              </div>
            </div>
          </section>

          <!-- Section 2: Runner (Main Focus) -->
          <section class="section section-runner">
            <div class="section-header static">
              <h2>Run</h2>
            </div>
            
            <div class="section-content">
              <!-- Runner Controls -->
              <div class="runner-controls">
                <div class="control-row">
                  <div class="control-group">
                    <label for="modelSelect">Scanner Model</label>
                    <select id="modelSelect" class="select">
                      <!-- Populated by JS -->
                    </select>
                  </div>
                  
                  <div class="control-group">
                    <label>Display Mode</label>
                    <div class="btn-group" id="displayModeGroup">
                      <button class="btn btn-sm" data-value="manual">Manual</button>
                      <button class="btn btn-sm active" data-value="auto">Auto</button>
                      <button class="btn btn-sm" data-value="list">List</button>
                    </div>
                  </div>
                </div>
                
                <div class="control-row" data-show-for="auto">
                  <div class="control-group">
                    <label for="autoRate">Speed</label>
                    <select id="autoRate" class="select">
                      <option value="0.25">0.25 Hz (4s)</option>
                      <option value="0.4" selected>0.4 Hz (2.5s)</option>
                      <option value="0.5">0.5 Hz (2s)</option>
                      <option value="1.0">1.0 Hz (1s)</option>
                      <option value="2.0">2.0 Hz (0.5s)</option>
                    </select>
                  </div>
                  
                  <div class="control-group">
                    <label for="startDelay">Start Delay</label>
                    <select id="startDelay" class="select">
                      <option value="0">None</option>
                      <option value="1">1 second</option>
                      <option value="2">2 seconds</option>
                      <option value="3" selected>3 seconds</option>
                      <option value="5">5 seconds</option>
                    </select>
                  </div>
                </div>
              </div>
              
              <!-- Barcode Display -->
              <div class="barcode-area">
                <div class="barcode-container" id="barcodeContainer">
                  <canvas id="barcodeCanvas"></canvas>
                  <div class="barcode-placeholder" id="barcodePlaceholder">
                    Click <strong>Run</strong> to start
                  </div>
                </div>
                
                <div class="runner-progress">
                  <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                  </div>
                  <span class="progress-text" id="progressText">0 / 0</span>
                </div>
                
                <div class="runner-nav" id="runnerNav">
                  <button class="btn btn-lg" id="prevBtn">← Prev</button>
                  <div class="runner-actions">
                    <button class="btn btn-lg btn-primary" id="runBtn">
                      <span class="btn-icon">▶</span>
                      <span>Run</span>
                    </button>
                    <button class="btn btn-lg btn-danger hidden" id="stopBtn">
                      <span class="btn-icon">■</span>
                      <span>Stop</span>
                    </button>
                  </div>
                  <button class="btn btn-lg" id="nextBtn">Next →</button>
                </div>
              </div>
            </div>
          </section>

          <!-- Section 3: Share (Compact) -->
          <section class="section section-share">
            <div class="section-header static">
              <h2>Share</h2>
            </div>
            
            <div class="section-content">
              <div class="share-row">
                <div class="share-qr">
                  <canvas id="shareQrCanvas" width="200" height="200"></canvas>
                  <div class="share-qr-placeholder" id="shareQrPlaceholder">
                    Click Generate to create QR
                  </div>
                </div>
                
                <div class="share-actions">
                  <p class="share-description">
                    Scan with your phone to open this payload on mobile.
                  </p>
                  
                  <div class="share-url-row">
                    <input type="text" id="shareUrl" readonly placeholder="Click Generate...">
                    <button class="btn btn-sm btn-ghost" id="copyUrlBtn">Copy</button>
                  </div>
                  
                  <button class="btn btn-primary" id="generateShareBtn">Generate Share Link</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Import Modal -->
  <dialog id="importModal" class="modal">
    <div class="modal-content">
      <h2>Import Payload</h2>
      <textarea id="importTextarea" placeholder="Paste payload JSON here..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="importCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="importConfirmBtn">Import</button>
      </div>
    </div>
  </dialog>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
